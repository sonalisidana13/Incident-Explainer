services:
  db:
    image: pgvector/pgvector:pg16
    container_name: incident-explainer-db
    environment:
      POSTGRES_DB: incident_explainer
      POSTGRES_USER: incident_explainer
      POSTGRES_PASSWORD: incident_explainer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U incident_explainer -d incident_explainer"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    container_name: incident-explainer-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/incident_explainer
      SPRING_DATASOURCE_USERNAME: incident_explainer
      SPRING_DATASOURCE_PASSWORD: incident_explainer
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8080/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
