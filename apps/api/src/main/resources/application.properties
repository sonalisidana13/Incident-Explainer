server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/incident_explainer}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:incident_explainer}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:incident_explainer}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

embedding.provider=${EMBEDDING_PROVIDER:fake}
llm.provider=${LLM_PROVIDER:heuristic}
