server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/incident_explainer}
    username: ${SPRING_DATASOURCE_USERNAME:incident_explainer}
    password: ${SPRING_DATASOURCE_PASSWORD:incident_explainer}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration

embedding:
  provider: ${EMBEDDING_PROVIDER:fake}

llm:
  provider: ${LLM_PROVIDER:heuristic}
